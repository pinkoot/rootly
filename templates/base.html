<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ROOTLY{% endblock %}</title>

{% load static %}

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
}

body {
    background-color: #1a1a1a;
    color: #e0e0e0;
    line-height: 1.6;
}

/* HEADER */

header {
    background-color: #2c2c2c;
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

.nav-container{
    max-width:1200px;
    margin:auto;
    padding:15px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

/* LOGO */

.logo-section{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:30px; 
}

.site-name{
    font-size:1.8rem;
    color:#00ff88;
    font-weight:bold;
}

/* NAV */

nav{
    display:flex;
    gap:25px;
}

nav a{
    color:#00ff88;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:white;
}

/* AUTH BUTTONS */

.auth-buttons{
    display:flex;
    gap:10px;
}

.btn{
    padding:6px 14px;
    border-radius:4px;
    text-decoration:none;
    font-weight:bold;
}

.login{
    border:1px solid #00ff88;
    color:#00ff88;
}

.login:hover{
    background:#00ff88;
    color:#1a1a1a;
}

.register{
    background:#00ff88;
    color:#1a1a1a;
}

.register:hover{
    background:#00cc66;
}

/* CONTAINER */

.container {
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 1rem;
    text-align: center;
}

/* FOOTER */

footer {
    text-align: center;
    padding: 1rem;
    background-color: #2c2c2c;
    position: fixed;
    width: 100%;
    bottom: 0;
}

footer p {
    font-size: 0.9rem;
    color: #b0b0b0;
}

</style>
</head>

<body>

<header>
<div class="nav-container">

    <div class="logo-section">
        <img src="{% static 'png/logo.png' %}" class="logo">
        <span class="site-name">ROOTLY</span>
    </div>

    <nav>
        <a href="{% url 'main:info' %}">Home</a>
        <a href="{% url 'main:challenges' %}">Challenges</a>
        <a href="{% url 'main:about' %}">About</a>
    </nav>

    <div class="auth-buttons">
        <a href="#" class="btn login">Sign in</a>
        <a href="#" class="btn register">Sign up</a>
    </div>

</div>
</header>

<div class="container">
{% block content %}
{% endblock %}
</div>

<footer>
<p>&copy; 2026 CTF Arena. All rights reserved.</p>
</footer>

</body>
</html>
