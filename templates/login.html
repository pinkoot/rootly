{% extends "base.html" %}

{% block title %}Login | ROOTLY{% endblock %}

{% block content %}

<style>

.login-box{
    width:350px;
    margin:60px auto;
    padding:30px;
    background:#2c2c2c;
    border-radius:8px;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.login-box h2{
    margin-bottom:20px;
    color:#00ff88;
}

.form-group{
    margin-bottom:15px;
    text-align:left;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

.form-group input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:4px;
    background:#1a1a1a;
    color:white;
}

.form-group input:focus{
    outline:1px solid #00ff88;
}

.login-btn{
    width:100%;
    padding:10px;
    background:#00ff88;
    border:none;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn:hover{
    background:#00cc66;
}

.extra{
    margin-top:15px;
    font-size:14px;
}

.extra a{
    color:#00ff88;
    text-decoration:none;
}

.extra a:hover{
    text-decoration:underline;
}

</style>


<div class="login-box">

<h2>Sign in</h2>

<form method="post">

{% csrf_token %}

<div class="form-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button class="login-btn">Login</button>

</form>

<div class="extra">
<p>Don't have an account? <a href="{% url 'main:register' %}">Register</a></p>
</div>

</div>

{% endblock %}
