{% extends "base.html" %}

{% block title %}Register | ROOTLY{% endblock %}

{% block content %}

<style>

.register-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    height:75vh;
}

.register-card{
    width:400px;
    background:#222;
    border-radius:10px;
    padding:35px;
    box-shadow:0 0 20px rgba(0,0,0,0.7);
}

.register-title{
    color:#00ff88;
    font-size:1.8rem;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
    text-align:left;
}

.input-group label{
    font-size:13px;
    color:#b0b0b0;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:none;
    border-radius:5px;
    background:#1a1a1a;
    color:white;
}

.input-group input:focus{
    outline:none;
    border:1px solid #00ff88;
}

.register-button{
    width:100%;
    padding:11px;
    margin-top:10px;
    background:#00ff88;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.register-button:hover{
    background:#00cc66;
}

.register-footer{
    margin-top:20px;
    font-size:14px;
}

.register-footer a{
    color:#00ff88;
    text-decoration:none;
}

.register-footer a:hover{
    text-decoration:underline;
}

</style>

<div class="register-wrapper">

<div class="register-card">

<div class="register-title">Create account</div>

<form method="post">

{% csrf_token %}

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password1" required>
</div>

<div class="input-group">
<label>Confirm password</label>
<input type="password" name="password2" required>
</div>

<button class="register-button">Register</button>

</form>

<div class="register-footer">
Already have an account? <a href="{% url 'main:login' %}">Login</a>
</div>

</div>

</div>

{% endblock %}
